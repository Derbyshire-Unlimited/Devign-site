<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Card Glow</title>
  <style>
    body {
      background: #0a0a0a;
      font-family: 'Orbitron', sans-serif;
      color: #e0f7ff;
      padding: 2rem;
    }

    .repo-card {
      position: relative;
      background: linear-gradient(135deg, rgba(255, 105, 180, 0.05), rgba(138, 43, 226, 0.05));
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 2rem auto;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      transition: transform 0.3s ease;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .repo-card:hover {
      transform: scale(1.01);
    }

    .repo-card::before,
    .repo-card::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 2px solid limegreen;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      box-sizing: border-box;
      z-index: 2;
      animation: perimeter-rotate 2s linear infinite;
      mix-blend-mode: lighten;
    }

    .repo-card::after {
      animation-delay: 1s;
    }

    .repo-card:hover::before,
    .repo-card:hover::after {
      opacity: 0.5;
    }

    @keyframes perimeter-rotate {
      0% {
        clip-path: polygon(0% 0%, 100% 0%, 100% 0%, 0% 0%);
      }
      25% {
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 100% 100%);
      }
      50% {
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
      }
      75% {
        clip-path: polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%);
      }
      100% {
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
      }
    }
  </style>
</head>
<body>
  <div class="repo-card">
    <h3><a href="#">Test Repo</a></h3>
    <p>This is a glowing card with a hover effect.</p>
  </div>
</body>
</html>
